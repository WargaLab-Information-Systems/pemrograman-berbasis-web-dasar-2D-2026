<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-sans">

<div class="grid md:grid-cols-2 min-h-screen">

  <!-- KIRI -->
  <div class="bg-[#5f79b8] text-white flex flex-col justify-center items-center text-center p-8">
    
    <h1 class="font-bold text-4xl md:text-5xl mb-4">
      Hello Prospective Students
    </h1>

    <img src="gambar gambar/gambar login.png"
         class="w-full max-w-[500px] my-6">

    <p class="text-lg md:text-xl max-w-md">
      Unlock your professional potential. Learn from industry leaders 
      and stay ahead of the competition.
    </p>

  </div>

  <!-- KANAN -->
  <div class="bg-gray-200 flex justify-center items-center p-6">
    
    <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow">
      
      <h1 class="text-2xl font-bold text-center mb-2">
        LOGIN PAGE
      </h1>

      <p class="text-center text-gray-500 mb-4">
        Masukkan Username dan Password Anda
      </p>

      <input type="email" id="email"
        class="w-full border rounded-lg px-4 py-3 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Email Address">

      <input type="password" id="password"
        class="w-full border rounded-lg px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Password">

      <button onclick="login()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
        Login
      </button>

      <div class="text-center text-gray-500 my-4">
        Or Login With
      </div>

      <button class="w-full border py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100 transition">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
        Sign in with Google
      </button>

    </div>

  </div>

</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email === "" || password === "") {
    alert("Email dan Password harus diisi!");
  } else {
    alert("Login berhasil (simulasi)");
  }
}
</script>

</body>
</html>
