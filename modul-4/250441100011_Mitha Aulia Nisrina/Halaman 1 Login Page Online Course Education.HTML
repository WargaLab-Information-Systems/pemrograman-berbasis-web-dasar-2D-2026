<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page Online Course Education</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: sans-serif;
      }
      .left {
        background-color: #5e7ac4;
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .left h1 {
        font-weight: 600;
        font-size: 45px;
      }
      .left p {
        font-weight: 600;
        margin-top: 20px;
        max-width: 400px;
      }
      .left img {
        width: 600px;
        margin-top: 10px;
      }
      .right {
        background-color: #eef1f7;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        width: 100%;
        max-width: 350px;
        text-align: center;
      }
      .form-control {
        text-align: center;
      }
      .form-control::placeholder {
        color: #5e7ac4;
        font-weight: 700;
      }
      .btn-login {
        background-color: #3852b4;
        color: white;
        font-weight: 600;
      }
      .btn-login:hover {
        background-color: #2e4193;
      }
      .login-box h5 {
        font-weight: 700;
        letter-spacing: 1px;
      }
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 10px;
        color: gray;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #ccc;
      }
      .divider:not(:empty)::before {
        margin-right: 0.5em;
      }
      .divider:not(:empty)::after {
        margin-left: 0.5em;
      }
      .google-btn {
        border: 1px solid #ccc;
        background: white;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .google-btn img {
        width: 20px;
      }
      .subtitle {
        color: gray;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-7 left">
          <h1>
            Hello Prospective <br />
            Students
          </h1>

          <img src="UTS/gambar_login page.png" alt="gambar login page" />

          <p>
            Unlock Your Professional Potential. <br />
            Learn from industry leaders and stay ahead of the competition.
          </p>
        </div>

        <div class="col-md-5 right">
          <div class="login-box">
            <h5>LOGIN PAGE</h5>
            <p class="subtitle">Masukkan Username dan Password Anda</p>

            <form id="loginForm">
              <div class="mb-3">
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Email Address"
                />
              </div>

              <div class="mb-3">
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Password"
                />
              </div>

              <button type="submit" class="btn btn-login w-100 mb-3">
                Login
              </button>

              <div class="divider">Or Login With</div>

              <button
                type="button"
                id="googleLogin"
                class="btn google-btn w-100"
              >
                <img src="UTS/ic_google.png" alt="icon google" />
                Sign in with Account Google
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      // LOGIN BIASA
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let email = document.getElementById("email").value.trim();
          let password = document.getElementById("password").value.trim();

          let errors = [];

          // VALIDASI EMAIL
          if (email === "") {
            errors.push("Email harus diisi!");
          } else {
            if (!email.includes("@") || !email.includes(".")) {
              errors.push("Format email tidak valid! (contoh: user@gmail.com)");
            }

            if (email.length < 8) {
              errors.push("Email terlalu pendek!");
            }
          }

          // VALIDASI PASSWORD
          if (password === "") {
            errors.push("Password harus diisi!");
          } else {
            if (password.length < 8) {
              errors.push("Password minimal 8 karakter!");
            }

            let adaHuruf = false;
            let adaAngka = false;

            for (let i = 0; i < password.length; i++) {
              if (
                (password[i] >= "a" && password[i] <= "z") ||
                (password[i] >= "A" && password[i] <= "Z")
              ) {
                adaHuruf = true;
              }
              if (password[i] >= "0" && password[i] <= "9") {
                adaAngka = true;
              }
            }

            if (!adaHuruf || !adaAngka) {
              errors.push("Password harus mengandung huruf dan angka!");
            }

            if (password.includes(" ")) {
              errors.push("Password tidak boleh mengandung spasi!");
            }
          }

          // TAMPILKAN SEMUA ERROR
          if (errors.length > 0) {
            alert(errors.join("\n"));
            return;
          }

          // LOGIN BERHASIL
          alert("Login berhasil!");
          window.location.href =
            "Halaman 2 Homepage Online Course Education.html";
        });

      // LOGIN GOOGLE
      document
        .getElementById("googleLogin")
        .addEventListener("click", function (e) {
          alert("Login dengan Google berhasil!");
          window.location.href =
            "Halaman 2 Homepage Online Course Education.html";
        });
    </script>
  </body>
</html>
