<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-100">
    <!-- Full screen -->
    <div class="min-h-screen flex flex-col md:flex-row">
      
      <!-- LEFT SIDE -->
      <div
        class="w-full md:w-1/2 bg-orange-300 flex flex-col justify-center items-center px-6 md:px-20 py-10 text-white">
        <h1
          class="text-2xl md:text-3xl font-bold leading-tight mb-6 text-center">
          Hello Prospective Students
        </h1>
        <div>
          <img
            src="hero.section.png"
            alt="ilustrasi_login"
            class="w-[220px] md:w-[300px]" />
        </div>
        <p
          class="text-center font-medium max-w-sm leading-relaxed text-sm md:text-base mt-5">
          Unlock your professional potential. Learn from industry leaders and
          stay ahead of the competition.
        </p>
      </div>

      <!-- RIGHT SIDE -->
      <div
        class="w-full md:w-1/2 bg-orange-100 flex items-center justify-center px-6 py-10"
      >
        <div class="w-full max-w-[320px]">
          <h2
            class="text-lg md:text-xl font-bold text-center text-gray-800 mb-2"
          >
            LOGIN PAGE
          </h2>

          <p class="text-center text-gray-500 text-xs mb-5">
            Masukan Username dan Password Anda
          </p>

          <!-- Email -->
          <input
            type="email"
            placeholder="Email Address"
            class="w-full mb-3 px-4 py-2.5 text-sm rounded-lg bg-white shadow-sm border border-gray-200 focus:outline-none"
          />

          <!-- Password -->
          <input
            type="password"
            placeholder="Password"
            class="w-full mb-4 px-4 py-2.5 text-sm rounded-lg bg-white shadow-sm border border-gray-200 focus:outline-none"
          />

          <!-- Login Button -->
          <button
            class="w-full bg-[#3F5BBF] text-white text-sm font-semibold py-2.5 rounded-lg hover:opacity-90 transition mb-5 cursor-pointer"
          >
            Login
          </button>

          <!-- Divider -->
          <div class="flex items-center gap-3 mb-5">
            <div class="flex-1 h-px bg-gray-300"></div>
            <span class="text-gray-500 text-xs">Or Login With</span>
            <div class="flex-1 h-px bg-gray-300"></div>
          </div>

          <!-- Google Button -->
          <button
            class="w-full bg-white border border-gray-200 shadow-sm rounded-lg py-2.5 flex items-center justify-center gap-2 hover:bg-gray-50 transition cursor-pointer"
          >
            <img
              src="https://cdn-icons-png.flaticon.com/512/300/300221.png"
              alt="Google"
              class="w-4 h-4"
            />
            <span class="font-medium text-gray-700 text-xs">
              Sign in with Account Google
            </span>
          </button>
        </div>
      </div>
    </div>

    <script>
      // ambil semua elemen
      const emailInput = document.querySelector('input[type="email"]');
      const passwordInput = document.querySelector('input[type="password"]');

      const buttons = document.querySelectorAll("button");
      const loginButton = buttons[0];
      const googleButton = buttons[1];

      // LOGIN BUTTON
      loginButton.addEventListener("click", function () {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (email === "" || password === "") {
          alert("Email dan Password harus diisi!");
          return;
        }

        if (!email.includes("@gmail.com")) {
          alert("Format email tidak valid!");
          return;
        }

        alert("Login berhasil!");
      });

      // GOOGLE BUTTON
      googleButton.addEventListener("click", function () {
        alert("Login dengan Google dipilih!");

        window.location.href = "https://accounts.google.com/";
      });
    </script>
  </body>
</html>
