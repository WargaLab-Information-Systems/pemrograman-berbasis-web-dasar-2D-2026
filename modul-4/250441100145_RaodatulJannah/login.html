<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login - BzMe</title>
	<script src="https://cdn.tailwindcss.com"></script>

	<script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        bzme: {
                            purple: '#8B5CF6', 
                            orange: '#FB923C', 
                        }
                    }
                }
            }
        };
    </script>
</head>


<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen flex items-center justify-center px-4 transition-colors duration-300">
	<button id="themeToggle"
		class="fixed top-5 right-5 bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition z-20">
		Mode Gelap
	</button>

	<div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
		<div class="text-center mb-6">
			<img src="Assets/Logo.png" alt="BzMe Logo" class="w-16 h-16 mx-auto mb-3">
			<h1 class="text-2xl font-bold text-purple-600">Login BzMe</h1>
			<p class="text-sm text-gray-500 dark:text-gray-300 mt-1">Silakan masuk ke akun Anda</p>
		</div>

		<form id="loginForm" novalidate>
			<div class="mb-4">
				<label for="name" class="block text-sm font-medium mb-1">Nama Lengkap</label>
				<input id="name" type="text" class="w-full border rounded-lg px-3 py-2 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500">
				<p id="nameError" class="text-red-500 text-sm mt-1"></p>
			</div>

			<div class="mb-4">
				<label for="email" class="block text-sm font-medium mb-1">Email</label>
				<input id="email" type="email" class="w-full border rounded-lg px-3 py-2 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500">
				<p id="emailError" class="text-red-500 text-sm mt-1"></p>
			</div>

			<div class="mb-5">
				<label for="password" class="block text-sm font-medium mb-1">Password</label>
				<input id="password" type="password" class="w-full border rounded-lg px-3 py-2 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500">
				<p id="passwordError" class="text-red-500 text-sm mt-1"></p>
			</div>

			<button type="submit" class="w-full bg-orange-400 text-white py-2.5 rounded-lg font-medium hover:bg-orange-500 transition">
				Login
			</button>

			<p id="successMessage" class="text-green-600 text-sm text-center mt-4"></p>
		</form>

		<a href="index.html" class="block text-center text-sm text-purple-600 dark:text-purple-300 mt-6">← Kembali ke Homepage</a>
	</div>

	
	<script src="config.js"></script>
</body>

</html>
